name: Training and Deploying Movie Recommender

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  PROJECT_ID: lastbit-prj-d-movieapi
  REGISTRY: us-central1-docker.pkg.dev/lastbit-prj-d-movieapi/reg-d-movieapi-pipelines
  STAGING_BUCKET: gs://bkt-d-movieapi-artifacts
  ENDPOINT_ID: projects/226965473545/locations/us-central1/endpoints/ep-d-movieapi-recommender

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t ${{ env.REGISTRY }}/trainer:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/trainer:${{ github.sha }}

      - name: Submit training job
        run: |
          pip install -r requirements-pipeline.txt
          python pipelines/submit.py \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGISTRY }}/trainer:${{ github.sha }} \
            --staging-bucket=${{ env.STAGING_BUCKET }} \
            --endpoint-id=${{ env.ENDPOINT_ID }}


      - name: Submit pipeline
        run: |
          pip install -r requirements.txt
          python pipelines/submit.py \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGISTRY }}/trainer:${{ github.sha }}


